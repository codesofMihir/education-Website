<body>
    <section class="a">
            <div class="container-fluid">
            <div class="row">
                <div class="col-md-7">
                    <img src="img/bg1.jpeg" alt="back" width="100%" style="height: 100vh;">

                </div>



                <div class="col-md-5">
                    <div class="card-body">
                        <form>
                            <div class="name">
                                <label for="username">USER NAME</label>
                                <input type="text" placeholder="username" id="username" class="form-control">
                            </div>


                            <div class="pass">
                                <label for="password">Password</label>
                                <input type="password" placeholder=" enter 8 digit password" id="password">
                            </div>

                            <div class="options">
                                <label class="remember"></label>
                                <input type="checkbox">Remember me

                                <a href="#" class="forget">Forget password</a>
                            </div>

                            <button type="submit" class="btn" onclick="login(event)">submit</button>

                            <div class="sign-up">
                                New student? <a href="#">Create an account</a>
                            </div>

                    </div>
                </div>
            </div>
    </section>
</body>
